<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💕 I Love You Safaaa 💕</title>
    <meta name="description" content="Une page d'amour pour Safaa">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating particles (flowers & hearts emoji) -->
    <div class="particles" id="particles" aria-hidden="true"></div>

    <!-- Floating heart-shaped photos -->
    <div class="floating-photos" id="floating-photos" aria-hidden="true"></div>

    <!-- Main content -->
    <main class="container">
        <!-- Hero Section -->
        <section class="hero" id="hero">
            <div class="hero-glow"></div>
            <h1 class="love-text" id="love-text">
                <span class="love-line love-line-1">I Love You</span>
                <span class="love-line love-line-2">Safaaa</span>
                <span class="love-hearts">💕</span>
            </h1>
            <div class="hero-subtitle">Pour toujours et à jamais</div>
        </section>

        <!-- Photo Carousel with shocked reaction -->
        <section class="beauty-section" id="beauty-section">
            <div class="reaction-bubble">
                <span class="reaction-emoji">😱</span>
                <span class="reaction-text">Waaa 3la zin !!</span>
            </div>
            <div class="carousel-wrapper" id="carousel-wrapper">
                <div class="carousel-track" id="carousel-track">
                    <!-- Photos injected by JS -->
                </div>
            </div>
            <div class="carousel-dots" id="carousel-dots"></div>
            <div class="reaction-bottom">
                <span class="reaction-bottom-text">Trop belle 😍🔥</span>
            </div>
        </section>

        <footer class="footer">
            <span>fait avec ❤️ pour toi</span>
        </footer>
    </main>

    <!-- Photo Modal -->
    <div class="modal" id="photo-modal">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close" aria-label="Fermer">✕</button>
            <img class="modal-image" id="modal-image" alt="Photo de Safaa">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
